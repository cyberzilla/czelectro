<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="CZElectro.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="CZElectro - Simulasi Lab Elektronika interaktif dengan drag-drop komponen, kabel fleksibel, dan animasi realistis.">
    <title>CZElectro — Lab Elektronika</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <script>
        // Apply theme BEFORE paint to prevent flash
        (function () {
            var t = localStorage.getItem('czelectro_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <!-- Hidden SVG Defs -->
    <svg style="width:0;height:0;position:absolute">
        <defs>
            <linearGradient id="battBody" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#111" />
                <stop offset="30%" stop-color="#444" />
                <stop offset="50%" stop-color="#222" />
                <stop offset="80%" stop-color="#555" />
                <stop offset="100%" stop-color="#111" />
            </linearGradient>
            <linearGradient id="battTop" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#d4af37" />
                <stop offset="100%" stop-color="#8b6508" />
            </linearGradient>
            <linearGradient id="resBody" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e2e8f0" />
                <stop offset="50%" stop-color="#f8fafc" />
                <stop offset="100%" stop-color="#94a3b8" />
            </linearGradient>
            <radialGradient id="ledGlass" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.8)" />
                <stop offset="50%" stop-color="rgba(200,200,200,0.3)" />
                <stop offset="100%" stop-color="rgba(100,100,100,0.5)" />
            </radialGradient>
            <radialGradient id="ledGlowGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fef08a" />
                <stop offset="50%" stop-color="#eab308" />
                <stop offset="100%" stop-color="#a16207" />
            </radialGradient>
            <radialGradient id="ledGlowRed" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fca5a5" />
                <stop offset="50%" stop-color="#ef4444" />
                <stop offset="100%" stop-color="#991b1b" />
            </radialGradient>
            <radialGradient id="ledGlowGreen" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#86efac" />
                <stop offset="50%" stop-color="#22c55e" />
                <stop offset="100%" stop-color="#166534" />
            </radialGradient>
            <radialGradient id="ledGlowBlue" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#93c5fd" />
                <stop offset="50%" stop-color="#3b82f6" />
                <stop offset="100%" stop-color="#1e3a8a" />
            </radialGradient>
            <radialGradient id="ledGlowWhite" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="50%" stop-color="#e5e7eb" />
                <stop offset="100%" stop-color="#6b7280" />
            </radialGradient>
            <radialGradient id="bulbGlowGrad" cx="50%" cy="40%" r="50%">
                <stop offset="0%" stop-color="#fffbeb" />
                <stop offset="40%" stop-color="#fde68a" />
                <stop offset="100%" stop-color="#d97706" />
            </radialGradient>
            <linearGradient id="motorBody" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#374151" />
                <stop offset="50%" stop-color="#4b5563" />
                <stop offset="100%" stop-color="#1f2937" />
            </linearGradient>
            <filter id="innerShadow">
                <feOffset dx="0" dy="3" />
                <feGaussianBlur stdDeviation="3" result="offset-blur" />
                <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
                <feFlood flood-color="black" flood-opacity="0.6" result="color" />
                <feComposite operator="in" in="color" in2="inverse" result="shadow" />
                <feComposite operator="over" in="shadow" in2="SourceGraphic" />
            </filter>
            <filter id="glow">
                <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                <feMerge>
                    <feMergeNode in="coloredBlur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>
    </svg>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div id="sidebar-header">
            <div class="logo-row">
                <div class="logo-icon">⚡</div>
                <div class="title">CZElectro</div>
            </div>
            <div class="subtitle">Lab Elektronika Interaktif</div>
        </div>
        <div class="category-tabs">
            <button class="cat-tab active" data-cat="all">Semua</button>
            <button class="cat-tab" data-cat="source">Sumber</button>
            <button class="cat-tab" data-cat="passive">Pasif</button>
            <button class="cat-tab" data-cat="output">Output</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="comp-search" placeholder="🔍 Cari komponen..." autocomplete="off" spellcheck="false">
        </div>
        <div id="component-list"></div>
    </aside>

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle Sidebar (Tab)">✕</button>
    <script>
        // Apply sidebar state BEFORE paint to prevent flash
        (function () {
            var sb = document.getElementById('sidebar');
            var tb = document.getElementById('sidebar-toggle');
            if (window.innerWidth > 768) {
                var s = localStorage.getItem('czelectro_sidebar');
                if (s === 'collapsed') {
                    sb.classList.add('no-transition', 'collapsed');
                    tb.textContent = '☰';
                    // Re-enable transitions after first paint
                    requestAnimationFrame(function () { requestAnimationFrame(function () { sb.classList.remove('no-transition'); }); });
                }
            } else {
                tb.textContent = '☰';
            }
        })();
    </script>

    <!-- Main Workspace -->
    <main id="workspace-container">
        <!-- Toolbar -->
        <div id="toolbar">
            <!-- File Group -->
            <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩</button>
            <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled>↪</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" id="btn-save" title="Simpan File (Ctrl+S)">💾</button>
            <button class="tb-btn" id="btn-open" title="Buka File (Ctrl+O)">📂</button>
            <input type="file" id="file-input" accept=".cze,.json" style="display:none">
            <div class="tb-sep"></div>
            <!-- View Group -->
            <button class="tb-btn" id="btn-zoom-in" title="Zoom In">🔍+</button>
            <button class="tb-btn" id="btn-zoom-out" title="Zoom Out">🔍−</button>
            <span class="tb-label" id="zoom-label">100%</span>
            <button class="tb-btn" id="btn-fit" title="Fit View">⊞</button>
            <div class="tb-sep"></div>
            <!-- Mode Group -->
            <button class="tb-btn active" id="btn-mode-select" title="Mode Seleksi (V)">🖱</button>
            <button class="tb-btn" id="btn-mode-pan" title="Mode Pan/Geser (H)">✋</button>
            <div class="tb-sep"></div>
            <!-- Component Tools -->
            <button class="tb-btn" id="btn-rotate" title="Putar 90° (R)">🔄</button>
            <button class="tb-btn" id="btn-group" title="Group (Ctrl+G)">📦</button>
            <button class="tb-btn" id="btn-ungroup" title="Ungroup (Ctrl+Shift+G)">📭</button>
            <div class="tb-sep"></div>
            <!-- Audio & Clear -->
            <button class="tb-btn" id="btn-mute" title="Mute/Unmute Suara (M)">🔊</button>
            <button class="tb-btn" id="btn-clear" title="Hapus Semua">🗑</button>
            <div class="tb-sep"></div>
            <!-- Settings -->
            <button class="tb-btn" id="btn-settings" title="Pengaturan">⚙️</button>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-header">⚙️ Pengaturan</div>
            <div class="settings-group">
                <div class="settings-group-title">🎨 Tampilan</div>
                <div class="settings-row">
                    <span class="settings-label">Tema</span>
                    <div class="settings-theme-toggle" id="theme-toggle">
                        <button class="theme-opt active" data-theme="dark" title="Dark">🌙</button>
                        <button class="theme-opt" data-theme="light" title="Light">☀️</button>
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Grid</span>
                    <label class="settings-switch">
                        <input type="checkbox" id="settings-grid" checked>
                        <span class="settings-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Canvas layers -->
        <canvas id="grid-canvas"></canvas>
        <div id="workspace">
            <svg id="wire-layer" width="5000" height="5000">
                <g id="wires-group"></g>
                <path id="temp-wire" d="" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="8 4"
                    style="display:none;pointer-events:none" />
            </svg>
        </div>

        <!-- Status Bar -->
        <div id="status-bar">
            <div class="status-item">
                <span class="status-dot" id="circuit-dot"></span>
                <span id="circuit-status">No Circuit</span>
            </div>
            <div id="circuit-loops"></div>
            <div class="status-item">
                <span>🧩</span>
                <span id="comp-count">0 parts</span>
            </div>
            <div class="sim-controls">
                <span class="sim-label">🔋 Simulasi:</span>
                <button class="sim-btn active" data-speed="0"
                    onclick="document.dispatchEvent(new CustomEvent('sim-speed',{detail:0}))">⏸</button>
                <button class="sim-btn" data-speed="1"
                    onclick="document.dispatchEvent(new CustomEvent('sim-speed',{detail:1}))">1x</button>
                <button class="sim-btn" data-speed="10"
                    onclick="document.dispatchEvent(new CustomEvent('sim-speed',{detail:10}))">10x</button>
                <button class="sim-btn" data-speed="60"
                    onclick="document.dispatchEvent(new CustomEvent('sim-speed',{detail:60}))">60x</button>
                <button class="sim-btn sim-reset"
                    onclick="document.dispatchEvent(new CustomEvent('sim-reset'))">🔄</button>
                <span class="sim-divider">|</span>
                <button class="sim-btn sim-day"
                    onclick="document.dispatchEvent(new CustomEvent('sim-jump',{detail:'day'}))">☀️ →06:00</button>
                <button class="sim-btn sim-night"
                    onclick="document.dispatchEvent(new CustomEvent('sim-jump',{detail:'night'}))">🌙 →18:00</button>
            </div>
            <div id="sim-panel" class="sim-panel"></div>
        </div>
    </main>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <script src="components.js"></script>
    <!-- Modular architecture: state → audio → grid → wire → circuit → components → ui → events -->
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/wire.js"></script>
    <script src="js/mna-solver.js"></script>
    <script src="js/circuit.js"></script>
    <script src="js/mna-evaluate.js"></script>
    <script src="js/components-ui.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/events.js"></script>
</body>

</html>
