name: Build Language Registry

on:
  push:
    paths:
      - 'lang/*.json'
      - '!lang/registry.json'

jobs:
  build-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build registry
        run: node build-lang.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lang/registry.json sw.js
          git diff --cached --quiet || git commit -m "chore: auto-update lang registry & SW version"
          git push
